# Page: device
# Edit this file. Run compile_settings_ui.py to emit settings_ui.json.
id: device
label: Device
icon: device
order: 6
remote_configurable: true
description: Device behavior, units, and recording settings
sections:
- id: general
  title: General
  description: Power, boot, and unit preferences
  items:
  - key: OffroadMode
    widget: toggle
    title: Force Offroad Mode
  - key: DeviceBootMode
    widget: option
    title: Wake Up Behavior
    description: 'Controls state of the device after boot/sleep. Default: Device will boot/wake-up normally and will be ready
      to engage. Offroad: Device will be in Always Offroad mode after boot/wake-up.'
    options:
    - value: 0
      label: Standard
    - value: 1
      label: Always Offroad
  - key: QuietMode
    widget: toggle
    title: Quiet Mode
  - key: OnroadUploads
    widget: toggle
    title: Onroad Uploads
  - key: MaxTimeOffroad
    widget: option
    title: Max Time Offroad
    description: Device will automatically shutdown after set time once the engine is turned off. 30h is the default.
    options:
    - value: 0
      label: Always On
    - value: 5
      label: 5m
    - value: 10
      label: 10m
    - value: 15
      label: 15m
    - value: 30
      label: 30m
    - value: 60
      label: 1h
    - value: 120
      label: 2h
    - value: 180
      label: 3h
    - value: 300
      label: 5h
    - value: 600
      label: 10h
    - value: 1440
      label: 24h
    - value: 1800
      label: 30h (Default)
  - key: CustomShutdownVoltage
    widget: option
    title: Minimum Battery Voltage
    description: Device will shutdown if the car battery reaches the set voltage. < 11.8V disables the minimum battery voltage check.
    options:
    - value: 11.7
      label: Always On
    - value: 11.8
      label: 11.8V (Default)
    - value: 11.9
      label: 11.9V
    - value: 12.0
      label: 12.0V
    - value: 12.1
      label: 12.1V
    - value: 12.2
      label: 12.2V
    - value: 12.3
      label: 12.3V
    - value: 12.4
      label: 12.4V
    - value: 12.5
      label: 12.5V
    - value: 12.6
      label: 12.6V
    - value: 12.7
      label: 12.7V
    - value: 12.8
      label: 12.8V
- id: language
  title: Language
  items:
  - key: LanguageSetting
    widget: info
    title: Language
