name: cereal validation

on:
  push:
    branches:
      - master
  pull_request:
    paths:
      - 'cereal/**'
  workflow_dispatch:
  workflow_call:
    inputs:
      run_number:
        default: '1'
        required: true
        type: string

concurrency:
  group: cereal-validation-ci-run-${{ inputs.run_number }}-${{ github.event_name == 'push' && github.ref == 'refs/heads/master' && github.run_id || github.head_ref || github.ref }}-${{ github.workflow }}-${{ github.event_name }}
  cancel-in-progress: true

env:
  CI: 1

jobs:
  validate_cereal_with_upstream:
    name: Validate cereal with Upstream
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout sunnypilot cereal
        uses: actions/checkout@v6
        with:
          sparse-checkout: cereal

      - name: Checkout upstream openpilot cereal
        uses: actions/checkout@v6
        with:
          repository: 'commaai/openpilot'
          path: upstream_openpilot
          sparse-checkout: cereal
          ref: "refs/heads/master"

      - name: Install pycapnp
        run: python3 -m pip install pycapnp

      - name: Generate sunnypilot schema
        run: |
          export PYTHONPATH=${{ github.workspace }}
          python3 cereal/messaging/tests/validate_sp_cereal_upstream.py -g -f /tmp/sp_schema.json

      - name: Validate against upstream
        run: |
          export PYTHONPATH=${{ github.workspace }}/upstream_openpilot
          python3 cereal/messaging/tests/validate_sp_cereal_upstream.py -r -f /tmp/sp_schema.json
