name: cereal validation

on:
  push:
    branches:
      - master
  pull_request:
    paths:
      - 'cereal/**'
  workflow_dispatch:
  workflow_call:
    inputs:
      run_number:
        default: '1'
        required: true
        type: string

concurrency:
  group: cereal-validation-ci-run-${{ inputs.run_number }}-${{ github.event_name == 'push' && github.ref == 'refs/heads/master' && github.run_id || github.head_ref || github.ref }}-${{ github.workflow }}-${{ github.event_name }}
  cancel-in-progress: true

env:
  CI: 1

jobs:
  validate_cereal:
    name: Validate cereal with Upstream
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout sunnypilot
        uses: actions/checkout@v6
        with:
          path: sunnypilot
          submodules: true
      - name: Checkout upstream openpilot
        uses: actions/checkout@v6
        with:
          repository: 'commaai/openpilot'
          path: openpilot
          submodules: true
          ref: "refs/heads/master"

      - name: Setup sunnypilot environment
        working-directory: sunnypilot
        uses: ./.github/workflows/setup-with-retry

      - name: Build sunnypilot cereal
        working-directory: sunnypilot
        run: scons -j$(nproc) cereal

      - name: Build upstream openpilot cereal
        working-directory: openpilot
        run: |
          # Use sunnypilot's setup for openpilot build dependencies if needed
          # or assume setup-with-retry handles it for the runner
          scons -j$(nproc) cereal

      - name: Generate and Validate
        working-directory: sunnypilot
        run: |
          # Generate schema instances using sunnypilot's cereal
          export PYTHONPATH=$GITHUB_WORKSPACE/sunnypilot
          python3 cereal/messaging/tests/validate_sp_cereal_upstream.py -g -f schema_instances.bin

          # Validate using upstream openpilot's cereal
          export PYTHONPATH=$GITHUB_WORKSPACE/openpilot
          python3 cereal/messaging/tests/validate_sp_cereal_upstream.py -r -f schema_instances.bin
